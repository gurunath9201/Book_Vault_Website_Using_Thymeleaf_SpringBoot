<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BookVault - Edit Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --bg:#0d0d0d; --surface:#141414; --card:#1a1a1a; --border:#2a2a2a; --gold:#c9a84c; --gold-lt:#e8c97a; --text:#e8e6e1; --muted:#7a7570; --accent:#4a7c6f; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
    .navbar-brand { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold) !important; }
    .navbar-brand span { color: var(--text); }
    .nav-link { color: var(--muted) !important; font-weight: 500; font-size: 0.88rem; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; padding: 0.4rem 1rem !important; }
    .nav-link:hover, .nav-link.active { color: var(--gold) !important; }
    .nav-btn { background: var(--gold); color: #000 !important; border-radius: 4px; font-weight: 700; }
    .nav-btn:hover { background: var(--gold-lt); }
    .navbar-toggler { border-color: var(--border); }
    .navbar-toggler-icon { filter: invert(1); }

    main { min-height: calc(100vh - 70px); display: flex; align-items: center; padding: 3rem 0; }

    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; max-width: 500px; width: 100%; margin: 0 auto; animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

    .form-header { background: var(--surface); padding: 2rem 2rem 1.5rem; border-bottom: 1px solid var(--border); }
    .form-icon { width: 52px; height: 52px; background: rgba(74,124,111,0.12); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #7dd3c0; margin-bottom: 1rem; }
    .form-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; }
    .form-sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }
    .divider { width: 40px; height: 3px; background: linear-gradient(90deg, #7dd3c0, transparent); margin: 0.8rem 0 0; }

    .form-body { padding: 2rem; }
    .edit-badge { background: rgba(74,124,111,0.1); border: 1px solid rgba(74,124,111,0.25); color: #7dd3c0; border-radius: 4px; padding: 0.2rem 0.6rem; font-size: 0.78rem; font-weight: 600; margin-left: 0.6rem; }

    .form-group { margin-bottom: 1.5rem; }
    .form-label-custom { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .form-control-custom { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; color: var(--text); padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-control-custom:focus { border-color: #7dd3c0; box-shadow: 0 0 0 3px rgba(74,124,111,0.12); }
    .form-control-custom::placeholder { color: var(--muted); }
    .input-icon-wrap { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }
    .form-control-custom.with-icon { padding-left: 2.7rem; }

    .btn-submit { width: 100%; background: var(--accent); border: none; color: #fff; padding: 0.9rem; font-weight: 700; font-size: 0.92rem; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 0.5rem; }
    .btn-submit:hover { background: #5a9c8a; transform: translateY(-1px); }

    .form-footer { padding: 1rem 2rem 1.5rem; text-align: center; }
    .form-footer a { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
    .form-footer a:hover { color: var(--gold); }

    footer { border-top: 1px solid var(--border); padding: 1.5rem; text-align: center; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/">Book<span>Vault</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="/available_books">All Books</a></li>
        <li class="nav-item"><a class="nav-link" href="/my_books">My Books</a></li>
        <li class="nav-item ms-lg-2"><a class="nav-link nav-btn" href="/book_register"><i class="fa fa-plus me-1"></i>Add Book</a></li>
      </ul>
    </div>
  </div>
</nav>

<main>
  <div class="container">
    <div class="form-card">
      <div class="form-header">
        <div class="form-icon"><i class="fa fa-pen-to-square"></i></div>
        <h2 class="form-title">Edit Book <span class="edit-badge" th:text="'#' + ${book.id}"></span></h2>
        <p class="form-sub">Update the book details below</p>
        <div class="divider"></div>
      </div>

      <form class="form-body" th:action="@{/save}" method="post">
        <!-- Hidden ID for update -->
        <input type="hidden" name="id" th:value="${book.id}"/>

        <div class="form-group">
          <label class="form-label-custom">Book Title</label>
          <div class="input-icon-wrap">
            <i class="fa fa-book input-icon"></i>
            <input type="text" name="name" class="form-control-custom with-icon"
                   th:value="${book.name}" placeholder="Book title" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label-custom">Author Name</label>
          <div class="input-icon-wrap">
            <i class="fa fa-user input-icon"></i>
            <input type="text" name="author" class="form-control-custom with-icon"
                   th:value="${book.author}" placeholder="Author name" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label-custom">Price (₹)</label>
          <div class="input-icon-wrap">
            <i class="fa fa-indian-rupee-sign input-icon"></i>
            <!-- ✅ FIXED: name="price" was missing in original -->
            <input type="number" name="price" class="form-control-custom with-icon"
                   th:value="${book.price}" placeholder="Price" min="1" required/>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa fa-save me-2"></i>Save Changes
        </button>
      </form>

      <div class="form-footer">
        <a href="/available_books"><i class="fa fa-arrow-left me-1"></i>Cancel &amp; go back</a>
      </div>
    </div>
  </div>
</main>

<footer>© 2026 <strong style="color:var(--gold)">BookVault</strong> - Book Store Management System</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
